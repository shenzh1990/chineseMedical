<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中医智能问答 - {{ .AppName }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="admin-layout">
    {{ template "admin_sidebar" . }}
  <main class="content-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">内容工具</p>
        <h1>中医智能问答</h1>
      </div>
      <nav class="actions">
        <a href="/settings/ai">模型设置</a>
      </nav>
    </header>

    <section class="qa-layout">
      <section class="qa-panel">
        <div class="qa-toolbar">
          <fieldset class="qa-modes">
            <legend>问答模式</legend>
            <label>
              <input type="radio" name="qa_mode" value="auto" checked>
              <span>自动识别</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="tcm-chat">
              <span>中医闲聊</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="tcm-diagnose">
              <span>辨证问诊</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="classics-search">
              <span>古籍检索</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="case-reference">
              <span>医案参考</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="herb-consult">
              <span>药材咨询</span>
            </label>
            <label>
              <input type="radio" name="qa_mode" value="image-analysis">
              <span>图文解析</span>
            </label>
          </fieldset>
          <button id="clearChat" type="button">清空对话</button>
        </div>

        <div id="chatThread" class="chat-thread" aria-live="polite">
          <article class="chat-message assistant">
            <strong>中医智能助手</strong>
            <p>可以咨询中医基础知识、药食同源、日常养生和辨证问诊方向。涉及具体疾病和用药时，我会保持科普边界并提示就医。</p>
          </article>
        </div>

        <form id="qaForm" class="qa-input">
          <textarea id="questionInput" rows="4" placeholder="输入问题，例如：脾胃虚弱的人日常饮食要注意什么？" required></textarea>
          <button type="submit">发送</button>
        </form>
      </section>

      <aside class="qa-side-panel">
        <span class="label">当前模型</span>
        <strong>{{ .Model }}</strong>
        <p>系统会先进行 6 类中医意图识别，再按场景策略生成回答。当前已接入本地知识库检索；GraphRAG、Neo4j、TCM-CV 会以能力状态提示降级。</p>

        <label class="qa-select-field">
          <span class="label">问答 Skill</span>
          <select id="skillSelect">
            <option value="">默认识别网络</option>
            {{ range .Skills }}
              <option value="{{ .ID }}">{{ .Name }}（{{ .Category }}）</option>
            {{ end }}
          </select>
        </label>

        <label class="qa-select-field">
          <span class="label">MCP 能力</span>
          <select id="mcpSelect" multiple size="5">
            {{ range .MCPs }}
              <option value="{{ .ID }}">{{ .Name }}（{{ .Category }}）</option>
            {{ end }}
          </select>
        </label>

        <span class="label">已选能力</span>
        <div id="capabilityPanel" class="intent-panel">默认识别网络</div>

        <span class="label">识别网络</span>
        <div id="intentPanel" class="intent-panel">等待提问</div>

        <span class="label">相关推荐方子</span>
        <div id="sourceList" class="qa-sources">暂无相关推荐</div>
      </aside>
    </section>
  </main>
  </div>

  <script>
    const qaForm = document.getElementById("qaForm");
    const questionInput = document.getElementById("questionInput");
    const chatThread = document.getElementById("chatThread");
    const clearChat = document.getElementById("clearChat");
    const sourceList = document.getElementById("sourceList");
    const intentPanel = document.getElementById("intentPanel");
    const capabilityPanel = document.getElementById("capabilityPanel");
    const skillSelect = document.getElementById("skillSelect");
    const mcpSelect = document.getElementById("mcpSelect");
    const history = [];

    function selectedMode() {
      const checked = document.querySelector("input[name='qa_mode']:checked");
      return checked ? checked.value : "auto";
    }

    function selectedSkillID() {
      return skillSelect && skillSelect.value ? Number(skillSelect.value) : 0;
    }

    function selectedMCPIDs() {
      if (!mcpSelect) {
        return [];
      }
      return Array.from(mcpSelect.selectedOptions).map(option => Number(option.value)).filter(Boolean);
    }

    function renderCapabilities(skill, mcps) {
      capabilityPanel.innerHTML = "";
      const rows = [];
      if (skill && skill.Name) {
        rows.push(["Skill", skill.Name]);
      } else if (skillSelect && skillSelect.selectedOptions.length && skillSelect.value) {
        rows.push(["Skill", skillSelect.selectedOptions[0].textContent]);
      } else {
        rows.push(["Skill", "默认识别网络"]);
      }
      if (mcps && mcps.length) {
        rows.push(["MCP", mcps.map(item => item.Name).join("、")]);
      } else if (mcpSelect && mcpSelect.selectedOptions.length) {
        rows.push(["MCP", Array.from(mcpSelect.selectedOptions).map(option => option.textContent).join("、")]);
      } else {
        rows.push(["MCP", "未选择"]);
      }
      rows.forEach(([label, value]) => {
        const item = document.createElement("div");
        const key = document.createElement("span");
        const text = document.createElement("strong");
        key.textContent = label;
        text.textContent = value;
        item.append(key, text);
        capabilityPanel.appendChild(item);
      });
    }

    function appendMessage(role, text) {
      const message = document.createElement("article");
      message.className = "chat-message " + role;
      const title = document.createElement("strong");
      title.textContent = role === "user" ? "用户" : "中医智能助手";
      const body = document.createElement("p");
      body.textContent = text;
      message.append(title, body);
      chatThread.appendChild(message);
      chatThread.scrollTop = chatThread.scrollHeight;
      return message;
    }

    function messageBody(message) {
      return Array.from(message.children).find(child => child.tagName === "P") || null;
    }

    function renderThoughts(message, thoughts) {
      const existing = message.querySelector(".thinking-trace");
      if (existing) {
        existing.remove();
      }
      if (!thoughts || !thoughts.length) {
        return;
      }

      const details = document.createElement("details");
      details.className = "thinking-trace";
      details.open = true;
      const summary = document.createElement("summary");
      summary.textContent = "思考过程（摘要）";
      const list = document.createElement("ol");
      thoughts.forEach(item => {
        const row = document.createElement("li");
        const title = document.createElement("span");
        const detail = document.createElement("p");
        title.textContent = item.title || "步骤";
        detail.textContent = item.detail || "";
        row.append(title, detail);
        list.appendChild(row);
      });
      details.append(summary, list);
      const body = messageBody(message);
      if (body) {
        message.insertBefore(details, body);
      } else {
        message.appendChild(details);
      }
      chatThread.scrollTop = chatThread.scrollHeight;
    }

    function renderThinkingTime(message, thinkingTime) {
      const existing = message.querySelector(".thinking-time");
      if (existing) {
        existing.remove();
      }
      if (!thinkingTime) {
        return;
      }
      const badge = document.createElement("div");
      badge.className = "thinking-time";
      badge.textContent = "思考用时：" + thinkingTime;
      const trace = message.querySelector(".thinking-trace");
      if (trace) {
        message.insertBefore(badge, trace);
      } else if (messageBody(message)) {
        message.insertBefore(badge, messageBody(message));
      } else {
        message.appendChild(badge);
      }
    }

    function formatThinkingElapsed(ms) {
      if (ms < 1000) {
        return Math.max(0, Math.round(ms)) + " 毫秒";
      }
      return (ms / 1000).toFixed(1) + " 秒";
    }

    function renderInlineRecommendations(message, items) {
      const existing = message.querySelector(".recommendation-trace");
      if (existing) {
        existing.remove();
      }
      if (!items || !items.length) {
        return;
      }
      const wrap = document.createElement("div");
      wrap.className = "recommendation-trace";
      const title = document.createElement("strong");
      title.textContent = "推荐方子";
      const list = document.createElement("div");
      items.forEach(item => {
        const link = document.createElement("a");
        link.href = item.url || ("/foods/" + item.id + "/images");
        link.textContent = item.name || "未命名方子";
        const reason = document.createElement("p");
        reason.textContent = item.reason || "本地知识库检索命中。";
        const card = document.createElement("section");
        card.append(link, reason);
        list.appendChild(card);
      });
      wrap.append(title, list);
      message.appendChild(wrap);
      chatThread.scrollTop = chatThread.scrollHeight;
    }

    function renderSources(items) {
      sourceList.innerHTML = "";
      if (!items || !items.length) {
        sourceList.textContent = "暂无相关推荐";
        return;
      }
      items.forEach(item => {
        const entry = document.createElement("a");
        entry.href = item.url || ("/foods/" + item.id + "/images");
        const title = document.createElement("strong");
        const reason = document.createElement("span");
        title.textContent = "#" + (item.id || "-") + " " + (item.name || "未命名方子");
        reason.textContent = item.reason || "本地知识库检索命中。";
        entry.append(title, reason);
        sourceList.appendChild(entry);
      });
    }

    function renderIntent(intent) {
      intentPanel.innerHTML = "";
      if (!intent) {
        intentPanel.textContent = "等待提问";
        return;
      }
      const rows = [
        ["场景", intent.label || intent.type || "未识别"],
        ["置信度", typeof intent.confidence === "number" ? Math.round(intent.confidence * 100) + "%" : "-"],
        ["情绪", intent.emotion || "-"],
        ["策略", intent.strategy || "-"],
      ];
      if (intent.missing_info && intent.missing_info.length) {
        rows.push(["缺失信息", intent.missing_info.join("、")]);
      }
      if (intent.external_capability) {
        rows.push(["能力状态", intent.external_capability]);
      }
      if (intent.cached_classics && intent.cached_classics.length) {
        rows.push(["古籍缓存", intent.cached_classics.join("；")]);
      }
      rows.forEach(([label, value]) => {
        const item = document.createElement("div");
        const key = document.createElement("span");
        const text = document.createElement("strong");
        key.textContent = label;
        text.textContent = value;
        item.append(key, text);
        intentPanel.appendChild(item);
      });
    }

    clearChat.addEventListener("click", () => {
      history.splice(0, history.length);
      chatThread.innerHTML = "";
      appendMessage("assistant", "对话已清空，可以开始新的中医智能问答。");
      renderSources([]);
      renderIntent(null);
      renderCapabilities(null, []);
    });

    if (skillSelect) {
      skillSelect.addEventListener("change", () => renderCapabilities(null, []));
    }
    if (mcpSelect) {
      mcpSelect.addEventListener("change", () => renderCapabilities(null, []));
    }
    renderCapabilities(null, []);

    qaForm.addEventListener("submit", async event => {
      event.preventDefault();
      const question = questionInput.value.trim();
      if (!question) {
        questionInput.focus();
        return;
      }

      appendMessage("user", question);
      history.push({ role: "user", content: question });
      questionInput.value = "";
      questionInput.disabled = true;
      const pending = appendMessage("assistant", "正在分析问题并生成回答...");
      renderThoughts(pending, [
        { title: "接收问题", detail: "已收到问题，准备带入上下文。" },
        { title: "识别场景", detail: "正在判断中医问答场景、情绪和缺失信息。" },
        { title: "检索知识", detail: "正在检索本地知识库并读取已选 Skill/MCP。" },
        { title: "整理回答", detail: "将按科普边界生成结构化回复。" },
      ]);
      const thinkingStartedAt = performance.now();
      renderThinkingTime(pending, "0.0 秒");
      const thinkingTimer = window.setInterval(() => {
        renderThinkingTime(pending, formatThinkingElapsed(performance.now() - thinkingStartedAt));
      }, 200);

      try {
        const response = await fetch("/tcm/questions/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            mode: selectedMode(),
            skill_id: selectedSkillID(),
            mcp_ids: selectedMCPIDs(),
            history: history.slice(-8),
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "问答请求失败。");
        }
        const answer = payload.answer || "";
        messageBody(pending).textContent = answer || "未返回回答。";
        renderThoughts(pending, payload.thoughts || []);
        renderThinkingTime(pending, payload.thinking_time || "");
        renderInlineRecommendations(pending, payload.recommendations || []);
        renderSources(payload.recommendations || []);
        renderIntent(payload.intent);
        renderCapabilities(payload.skill, payload.mcps || []);
        history.push({ role: "assistant", content: answer || "" });
      } catch (error) {
        renderThinkingTime(pending, formatThinkingElapsed(performance.now() - thinkingStartedAt));
        const body = messageBody(pending);
        body.textContent = body.textContent && body.textContent !== "正在分析问题并生成回答..."
          ? body.textContent + "\n\n" + (error.message || "问答请求失败。")
          : error.message || "问答请求失败。";
      } finally {
        window.clearInterval(thinkingTimer);
        questionInput.disabled = false;
        questionInput.focus();
      }
    });
  </script>
</body>
</html>
