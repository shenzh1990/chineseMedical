<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修改密码 - {{ .AppName }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-panel">
      <p class="eyebrow">Account</p>
      <h1>修改密码</h1>
      {{ if .Error }}
        <section class="notice error">{{ .Error }}</section>
      {{ end }}
      {{ if .Updated }}
        <section class="notice success">密码已修改。</section>
      {{ end }}
      <form class="login-form" method="post" action="/account/password">
        <label>
          <span class="label">当前密码</span>
          <input name="current_password" type="password" autocomplete="current-password" required>
        </label>
        <label>
          <span class="label">新密码</span>
          <input name="new_password" type="password" autocomplete="new-password" minlength="6" required>
        </label>
        <label>
          <span class="label">确认新密码</span>
          <input name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
        </label>
        <button type="submit">保存新密码</button>
      </form>
      <p class="form-footnote"><a href="/">返回首页</a></p>
    </section>
  </main>
</body>
</html>
